name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_COMPOSE_VERSION: 1.29.2

jobs:
  # =============================================================================
  # Test Frontend
  # =============================================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check || true

      - name: Test
        working-directory: frontend
        run: npm test || true

  # =============================================================================
  # Test Backend
  # =============================================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: bazov
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint
        working-directory: backend
        run: |
          pip install black isort flake8
          black --check .
          isort --check .
          flake8 .

      - name: Test with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bazov
          SECRET_KEY: test-secret-key
          DEBUG: true
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: backend/coverage.xml
          flags: backend

  # =============================================================================
  # Test Crawlers
  # =============================================================================
  test-crawlers:
    name: Test Crawlers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawlers/requirements.txt

      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Lint
        working-directory: crawlers
        run: |
          pip install black isort flake8
          black --check .
          isort --check .
          flake8 .

      - name: Test
        working-directory: crawlers
        run: |
          pytest tests/ -v || true

  # =============================================================================
  # Build Docker Images
  # =============================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-crawlers]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: yojedesign/bazov-frontend:latest,yojedesign/bazov-frontend:${{ github.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: yojedesign/bazov-backend:latest,yojedesign/bazov-backend:${{ github.sha }}

      - name: Build and push crawlers
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.crawlers
          push: ${{ github.event_name != 'pull_request' }}
          tags: yojedesign/bazov-crawlers:latest,yojedesign/bazov-crawlers:${{ github.sha }}
